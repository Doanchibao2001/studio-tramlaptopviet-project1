name: Publish laptop overheating article

on:
  push:
    branches: [main]
    paths:
      - scripts/publish-laptop-nong-quat-keu-to.mjs
      - .github/workflows/publish-laptop-article.yml
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Publish article to Sanity production
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
        run: node scripts/publish-laptop-nong-quat-keu-to.mjs

name: Deploy Sanity Studio

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'schemaTypes/**'
      - 'structure.ts'
      - 'sanity.config.ts'
      - 'sanity.cli.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-sanity-studio.yml'

permissions:
  contents: read

concurrency:
  group: deploy-sanity-studio
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
      SANITY_STUDIO_URL: ${{ vars.SANITY_STUDIO_URL || 'tramlaptopviet-project1.sanity.studio' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify deploy token
        shell: bash
        run: |
          if [ -z "$SANITY_AUTH_TOKEN" ]; then
            echo "Missing repository secret SANITY_AUTH_TOKEN"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate schema
        run: pnpm schema:validate

      - name: Deploy Studio and schema
        run: pnpm exec sanity deploy --yes --url "$SANITY_STUDIO_URL" --title "Trạm Laptop Việt" --schema-required

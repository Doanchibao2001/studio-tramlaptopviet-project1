name: Publish scheduled Sanity articles

on:
  schedule:
    # Vietnam UTC+7: 08:00, 13:00 and 19:00.
    - cron: '0 1,6,12 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-scheduled-articles.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate due articles without publishing
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: sanity-scheduled-publishing
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: sanity-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Publish scheduled articles
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
          SANITY_PROJECT_ID: qnykgwoz
          SANITY_DATASET: production
          EVENT_NAME: ${{ github.event_name }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DRY_RUN" = "true" ]; then
            node scripts/publish-scheduled-articles.mjs --limit 10 --dry-run
          elif [ "$EVENT_NAME" = "push" ]; then
            # One-time catch-up when this workflow is changed on main.
            # At 13:00 Vietnam time, up to 20 articles can be overdue.
            node scripts/publish-scheduled-articles.mjs --limit 10
            node scripts/publish-scheduled-articles.mjs --limit 10
          else
            node scripts/publish-scheduled-articles.mjs --limit 10
          fi

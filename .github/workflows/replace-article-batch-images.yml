name: Replace imported article batch images

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate only, without replacing article images
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: sanity-article-batch-images
  cancel-in-progress: false

jobs:
  replace-images:
    runs-on: ubuntu-latest
    environment: sanity-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Replace images for all 326 imported drafts
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
          SANITY_PROJECT_ID: qnykgwoz
          SANITY_DATASET: production
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            node scripts/replace-article-batch-images.mjs --input scripts/fixtures/sanity-batch-330.json --dry-run
          else
            node scripts/replace-article-batch-images.mjs --input scripts/fixtures/sanity-batch-330.json
          fi
